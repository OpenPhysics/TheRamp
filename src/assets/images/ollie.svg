<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 80" width="130" height="80">
  <!-- Body -->
  <ellipse cx="60" cy="54" rx="46" ry="22" fill="#d4a06a" stroke="#a06830" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="100" cy="38" rx="24" ry="22" fill="#d4a06a" stroke="#a06830" stroke-width="1.5"/>
  <!-- Ear (floppy, drooping) -->
  <ellipse cx="89" cy="20" rx="11" ry="16" fill="#b87840" stroke="#a06830" stroke-width="1.5" transform="rotate(-20 89 20)"/>
  <!-- Snout -->
  <ellipse cx="120" cy="44" rx="12" ry="9" fill="#e8c090" stroke="#a06830" stroke-width="1"/>
  <!-- Nose -->
  <ellipse cx="127" cy="42" rx="4" ry="3" fill="#222"/>
  <circle cx="126" cy="41" r="1" fill="#555"/>
  <!-- Closed eyes (sleeping crescent) -->
  <path d="M 86 32 Q 93 27 100 32" stroke="#4a2a10" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Snore bubbles / ZZZs -->
  <text x="102" y="18" font-family="Arial, sans-serif" font-size="11" fill="#7090c0" font-weight="bold" opacity="0.85">z</text>
  <text x="112" y="12" font-family="Arial, sans-serif" font-size="13" fill="#7090c0" font-weight="bold" opacity="0.85">z</text>
  <text x="122" y="5" font-family="Arial, sans-serif" font-size="10" fill="#7090c0" font-weight="bold" opacity="0.7">z</text>
  <!-- Tail (curled upward) -->
  <path d="M 14 50 Q 4 35 12 22 Q 18 14 24 22" stroke="#a06830" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Front paws -->
  <ellipse cx="80" cy="74" rx="11" ry="5" fill="#c09060" stroke="#a06830" stroke-width="1"/>
  <ellipse cx="60" cy="76" rx="11" ry="5" fill="#c09060" stroke="#a06830" stroke-width="1"/>
  <!-- Back paws -->
  <ellipse cx="38" cy="75" rx="11" ry="5" fill="#c09060" stroke="#a06830" stroke-width="1"/>
</svg>
