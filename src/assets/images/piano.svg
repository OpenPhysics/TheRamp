<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 160" width="110" height="160">
  <!-- Upright piano – side view, keyboard faces right -->

  <!-- Cabinet body (flush to base, like cabinet/fridge) -->
  <rect x="8" y="8" width="60" height="147" rx="2" fill="#1c0c04"/>

  <!-- Top lid -->
  <rect x="6" y="6" width="64" height="9" rx="2" fill="#2e1408"/>

  <!-- Music desk (small shelf at upper-front) -->
  <polygon points="68,14 88,7 90,11 70,19" fill="#3c1a09"/>

  <!-- Keyboard (protrudes from lower front face) -->
  <rect x="68" y="96" width="18" height="26" rx="1" fill="#f0ece4"/>
  <!-- Black key block -->
  <rect x="68" y="96" width="6" height="16" rx="1" fill="#1a1a1a"/>
  <!-- White key dividers -->
  <line x1="68" y1="104" x2="86" y2="104" stroke="#c8c0b8" stroke-width="0.8"/>
  <line x1="68" y1="112" x2="86" y2="112" stroke="#c8c0b8" stroke-width="0.8"/>
</svg>
